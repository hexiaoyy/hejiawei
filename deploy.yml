name: Deploy to Streamlit Cloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile coordinate_transform.py
          python -m py_compile obstacle_manager.py
          python -m py_compile path_planner.py
          python -m py_compile flight_monitor.py
          python -m py_compile mavlink_handler.py
          python -m py_compile comm_topology.py
